# Tenant topology lives here; secrets live in env vars referenced by api_key_env_var.
# Copy to tenants.toml (gitignored) and adjust.

[[tenants]]
name = "brand_a"
display_name = "Brand A"
provider = "sendgrid"
api_key_env_var = "BRAND_A_SENDGRID_API_KEY"

[[tenants]]
name = "brand_b"
display_name = "Brand B"
provider = "sendgrid"
api_key_env_var = "BRAND_B_SENDGRID_API_KEY"
